<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    
    <title>Viáticos</title>
    <meta name="title" content="Viáticos">
    <meta name="description" content="Gestión de solicitudes, anticipos y comprobación de gastos">

    <!-- ======================= CSS ======================= -->
    <link rel="stylesheet" href="./assets/css/jefe-dashboard.css">
    
    <!-- ======================= ICONS ======================= -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ======================= SWEET ALERT ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- ========================== CHART.JS ========================== -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="background">
        <!-- ======================= OPTIONS BAR ======================= -->
        <div class="option-bar">
            <div class="logo">
                <img src="./assets/images/White_logo.webp" alt="Grupo | PSA">
                <div class="name">
                    <p>Yuriana Ibarra</p>
                </div>
            </div>

            <div class="options">
                <div class="option dashboard">
                    <img src="./assets/images/Grid.webp" alt="Grid">
                    <p>Panel Principal</p>
                </div>

                <div class="option request">
                    <i class="fa-solid fa-plane-departure"></i>
                    <p>Solicitudes</p>
                </div>
            </div>

            <div class="logout">
                <div class="option">
                    <i class="fa-solid fa-arrow-right-from-bracket fa-rotate-180"></i>
                    <p>Cerrar Sesión</p>
                </div>
            </div>
        </div>

        <!-- ======================= CONTENT CONTAINER ======================= -->
        <div class="content-container">
            <div class="container">
                <!-- ==================== CONTENT HEADER ==================== -->
                <div class="content-header">
                    <div class="titles">
                        <h1 class="title">RESUMEN DE VIÁTICOS</h1>
                        <p class="subtitle">Visualiza métricas y tendencias de las solicitudes de tu equipo</p>
                    </div>
                </div>

                <div class="content">
                    <div class="cards">
                        <div class="card-wrapper">
                            <div class="card-background"></div>
                            <div class="card pending-card"></div>
                            <div class="card-text">
                                <p>SOLICITUDES PENDIENTES</p>
                                <p class="pending-number"><span><i class="fa-regular fa-clock"></i></span>18</p>
                            </div>
                        </div>

                        <div class="card-wrapper">
                            <div class="card-background"></div>
                            <div class="card approved-card"></div>
                            <div class="card-text">
                                <p>SOLICITUDES APROBADAS</p>
                                <p class="approved-number"><span><i class="fa-regular fa-circle-check"></i></span>23</p>
                            </div>
                        </div>

                        <div class="card-wrapper">
                            <div class="card-background"></div>
                            <div class="card rejected-card"></div>
                            <div class="card-text">
                                <p>SOLICITUDES RECHAZADAS</p>
                                <p class="rejected-number"><span><i class="fa-regular fa-circle-xmark"></i></span>05</p>
                            </div>
                        </div>
                    </div>

                    <div class="graphs">
                        <div class="status-back">
                            <div class="status-wrapper">
                                <p>SOLICITUDES POR ESTADO</p>

                                <div class="chartst-container">
                                    <canvas id="status-chart"></canvas>
                                </div>

                                <div class="tag-pending">
                                    <div class="color-tag"></div>
                                    <p>Pendientes</p>
                                </div>
                            </div>
                        </div>

                        <div class="month-requests">

                        </div>

                        <div class="expense">
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/jefe-dashboard.js"></script>
</body>
</html>
