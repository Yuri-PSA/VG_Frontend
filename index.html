<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">

        <title>Viáticos</title>
        <meta name="title" content="Viáticos">
        <meta name="description" content="Gestión de solicitudes, anticipos y comprobación de gastos">

        <!-- ======================= CSS ======================= -->
        <link rel="stylesheet" href="./assets/css/index.css">

        <!-- ======================= ICONS ======================= -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <!-- ======================= SWEET ALERT ======================= -->
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>

    <body>
        <div class="background">
            <div class="agave"></div>

            <div class="form">
                <img src="./assets/images/White_logo.webp" alt="Logo">
                <h1>BIENVENIDO</h1>
                <p>Sistema de gestión de viáticos</p>

                <div class="field">
                    <div class="field-back">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Usuario" id="user">
                    </div>
                </div>

                <div class="field second">
                    <div class="field-back">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Contraseña" id="password">
                        <i class="pass fa-solid fa-eye"></i>
                    </div>
                </div>

                <div class="button-login">INICIAR SESIÓN</div>
            </div>

            <div class="agave"></div>
        </div>

        <script src="./assets/js/index.js"></script>
    </body>
</html>
